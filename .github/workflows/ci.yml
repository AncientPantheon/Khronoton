name: Build & Validate

on:
  pull_request:
  push:
    branches:
      # main only (no master) — deliberate deviation from the stoa-js sibling's
      # main+master trigger; this repo has a single default branch.
      - main

jobs:
  validate:
    name: Typecheck + Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci) while local and CI npm versions differ;
        # tighten to npm ci once environments align.
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
